steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/jobhunter/api-gateway:latest', '-f', 'services/api-gateway/Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/jobhunter/api-gateway:latest']
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/jobhunter/api-gateway:latest'
